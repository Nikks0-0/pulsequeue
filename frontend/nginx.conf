server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so React Router's
    # client-side routes (e.g. /runs/:id) work on a hard refresh, not just
    # on in-app navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
