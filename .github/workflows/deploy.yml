name: Deploy

# Manually triggered on purpose: for a portfolio/demo project, auto-deploying
# on every push to main is a good way to take down your own demo at 2am with
# no warning. A "Run workflow" button is one click and keeps deploys
# intentional -- a real product team might wire this to run automatically
# after docker-build-push succeeds, once they trust the test suite enough.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,monitoring/**"
          target: "/opt/pulsequeue"

      - name: Pull new images and restart the stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/pulsequeue
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            docker compose -f deploy/docker-compose.prod.yml pull
            docker compose -f deploy/docker-compose.prod.yml up -d
            docker compose -f deploy/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            docker image prune -f

      - name: Verify the deployed API is healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            curl -sf http://localhost:4000/health || (echo "health check failed after deploy" && exit 1)
