name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast unit tests -- no external services, run on every push/PR, gate merges.
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Type-check
        working-directory: ${{ matrix.service }}
        run: npx tsc --noEmit -p tsconfig.json

      - name: Unit tests
        working-directory: ${{ matrix.service }}
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  # True end-to-end test: real Postgres + Redis service containers, real
  # Prisma migration, the actual worker process running and consuming the
  # stream, and the API hit via supertest -- this is the only stage that can
  # catch "wired the pieces together wrong" bugs that unit tests structurally
  # cannot see (wrong route path, mismatched env var name between services,
  # a migration that doesn't actually match the Prisma schema, etc).
  integration-test:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulsequeue
          POSTGRES_PASSWORD: pulsequeue
          POSTGRES_DB: pulsequeue
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pulsequeue"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pulsequeue:pulsequeue@localhost:5432/pulsequeue
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_test_access_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Run Prisma migrations
        working-directory: api
        run: npx prisma migrate deploy

      - name: Start worker in background
        working-directory: worker
        run: npx tsx src/index.ts &

      - name: Wait for worker metrics endpoint (readiness signal)
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:9100/health && break
            sleep 1
          done

      - name: Run integration tests
        working-directory: api
        run: npm run test:integration

  # Builds and pushes images to GitHub Container Registry, but only on main
  # (never on PRs from forks, which wouldn't have registry credentials
  # anyway) and only after every test stage above has passed.
  docker-build-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [unit-tests, frontend-build, integration-test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pulsequeue-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/pulsequeue-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
