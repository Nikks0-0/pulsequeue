version: "3.9"

# Production compose file: unlike the root docker-compose.yml (which builds
# images locally from source for fast dev iteration), this pulls pre-built
# images from GHCR that CI already built and tested -- the VPS never runs
# `npm install` or a TypeScript compile, it only ever runs finished,
# CI-verified artifacts. This is the same "build once, deploy the same
# artifact everywhere" principle that makes deployments predictable.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulsequeue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsequeue}
      POSTGRES_DB: pulsequeue
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsequeue"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/pulsequeue-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pulsequeue:${POSTGRES_PASSWORD:-pulsequeue}@postgres:5432/pulsequeue
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/pulsequeue-worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pulsequeue:${POSTGRES_PASSWORD:-pulsequeue}@postgres:5432/pulsequeue
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/pulsequeue-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
