version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsequeue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulsequeue
      POSTGRES_PASSWORD: pulsequeue
      POSTGRES_DB: pulsequeue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsequeue"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsequeue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    container_name: pulsequeue-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://pulsequeue:pulsequeue@postgres:5432/pulsequeue
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      DATABASE_URL: postgresql://pulsequeue:pulsequeue@postgres:5432/pulsequeue
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run `docker compose up --scale worker=3` to see multiple replicas
    # safely claiming steps from the same stream via SKIP LOCKED -- this is
    # the horizontal-scaling story for the whole project.
    deploy:
      replicas: 1

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000
    container_name: pulsequeue-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pulsequeue-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pulsequeue-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
